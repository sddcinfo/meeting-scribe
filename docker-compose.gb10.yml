# meeting-scribe GB10 model stack
#
# Translation uses the shared autosre vLLM model on port 8010
# (Intel/Qwen3.5-35B-A3B-int4-AutoRound, managed by `autosre start`).
# This compose only manages ASR, diarization, and TTS.
#
# Memory budget (single GB10, 128GB):
#   Shared model (INT4-AutoRound, port 8010):   ~24GB (managed by autosre)
#   ASR (Qwen3-ASR-1.7B):                      ~12GB
#   Diarization (pyannote):                     ~4GB
#   TTS (Qwen3-TTS-0.6B):                      ~2.5GB
#   Total:                                      ~43GB
#
# Port allocation (host networking):
#   8001 — Diarization (pyannote.audio)
#   8002 — TTS (faster-qwen3-tts, Qwen3-TTS-12Hz-0.6B-Base)
#   8003 — ASR (vLLM, Qwen3-ASR-1.7B)
#   8010 — Shared model: translation + coding (autosre, not in this compose)
#
# Offline mode:
#   All containers set HF_HUB_OFFLINE=1 + TRANSFORMERS_OFFLINE=1 so they
#   NEVER phone home to HuggingFace. Models must be pre-cached in
#   $HF_CACHE_DIR (default /data/huggingface) via `meeting-scribe gb10 pull-models`.
#
# Usage:
#   autosre start --scribe    # Starts everything (shared model + containers + UI)
#   docker compose -f docker-compose.gb10.yml up -d  # Containers only

services:
  # Speaker Diarization — pyannote.audio 4.0.4 / speaker-diarization-community-1
  # (production since 2026-04-28).  community-1 emits a single-speaker
  # exclusive timeline alongside the standard segmentation; the
  # exclusive output drives primary-speaker assignment in
  # speaker_attach.py while the standard output carries embeddings for
  # cross-chunk merging and detects cross-talk.  See
  # plans/stateful-marinating-whistle.md (Track C) for the bench result
  # that promoted community-1 to production.
  pyannote-diarize:
    image: pyannote-diarize:latest
    build:
      context: containers/pyannote
    container_name: scribe-diarization
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    volumes:
      - ${HF_CACHE_DIR:-/data/huggingface}:/root/.cache/huggingface
    environment:
      - DIARIZE_PORT=8001
      - DIARIZE_MAX_SPEAKERS=4
      # Pinned to community-1 explicitly.  The container's server.py
      # defaults to community-1 too — this restates the choice for
      # operators reading the compose file.  Override at run time only
      # to roll back to a previous pipeline (no production reason to do
      # so today; see MODEL_SELECTION.md decision log).
      - DIARIZE_PIPELINE_ID=${DIARIZE_PIPELINE_ID:-pyannote/speaker-diarization-community-1}
      - DIARIZE_PIPELINE_REVISION=${DIARIZE_PIPELINE_REVISION:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s

  # Interpretation Audio TTS — Qwen3-TTS via faster-qwen3-tts (CUDA graph optimized)
  # Two replicas on 8002 and 8012 so scribe-main can round-robin synth requests.
  # Each replica is ~1.2 GB in bf16; the GB10's 96 GB unified memory fits both
  # trivially, and the autoregressive decode loop is single-sequence-per-model,
  # so process-level parallelism is the simplest way to double throughput.
  qwen3-tts:
    image: scribe-tts:latest
    build:
      context: containers/tts
    container_name: scribe-tts
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    volumes:
      - ${HF_CACHE_DIR:-/data/huggingface}:/root/.cache/huggingface
    environment:
      - TTS_PORT=8002
      # Use the Base variant (not CustomVoice) — the 0.6B CustomVoice
      # weights ship with a broken `generate_custom_voice` path that raises
      # `does not support create_voice_clone_prompt` on every named-speaker
      # request, so every TTS synthesis returns 500. Base has no named
      # speakers but the container falls through to reference-audio
      # synthesis using default_voice.wav (or any cached enrolled voice),
      # which works.
      - TTS_MODEL=${TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-0.6B-Base}
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    restart: unless-stopped
    # Tell autoheal NOT to monitor this container. The TTS container does
    # synchronous PyTorch CUDA work that holds the Python GIL during
    # synthesis bursts, which makes /health take >5 s to respond. Autoheal
    # interpreted those slow probes as "unhealthy" and force-restarted the
    # container every 5–10 minutes mid-meeting, killing TTS the moment a
    # listener actually started consuming audio. We rely on Docker's own
    # `restart: unless-stopped` for genuine crashes; autoheal can stay
    # responsible for diarize / asr where the workload is stateless and
    # /health is never blocked.
    labels:
      - "autoheal=false"
    healthcheck:
      # Generous timeouts to ride out CUDA-busy moments. The healthcheck
      # exists only to surface "container is genuinely dead" — it must
      # never fire while the model is just slow.
      test: ["CMD", "curl", "-f", "--max-time", "25", "http://localhost:8002/health"]
      interval: 30s
      timeout: 30s
      retries: 6
      start_period: 180s

  qwen3-tts-2:
    image: scribe-tts:latest
    build:
      context: containers/tts
    container_name: scribe-tts-2
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    volumes:
      - ${HF_CACHE_DIR:-/data/huggingface}:/root/.cache/huggingface
    environment:
      - TTS_PORT=8012
      # See the qwen3-tts service above for why we use the Base variant.
      - TTS_MODEL=${TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-0.6B-Base}
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    restart: unless-stopped
    # Same autoheal exclusion as qwen3-tts — see comment there for the
    # full reason. Autoheal was force-restarting this container during
    # synthesis bursts and killing TTS mid-meeting.
    labels:
      - "autoheal=false"
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "25", "http://localhost:8012/health"]
      interval: 30s
      timeout: 30s
      retries: 6
      start_period: 180s

  # ASR — Qwen3-ASR-1.7B via vLLM
  vllm-asr:
    image: ${SCRIBE_VLLM_IMAGE:-scribe-vllm-asr:latest}
    build:
      context: containers/vllm-asr
    container_name: scribe-asr
    entrypoint: []
    command:
      - /bin/bash
      - -c
      - >
        vllm serve Qwen/Qwen3-ASR-1.7B
        --host 0.0.0.0
        --port 8003
        --tensor-parallel-size 1
        --max-model-len 4096
        --gpu-memory-utilization 0.10
        --max-num-seqs 4
        --enforce-eager
        --load-format fastsafetensors
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    volumes:
      - ${HF_CACHE_DIR:-/data/huggingface}:/root/.cache/huggingface
    environment:
      - NVIDIA_DISABLE_REQUIRE=1
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # OnlyOffice DocumentServer (removed 2026-04-17). The popout slide
  # viewer now uses the meeting-scribe-rendered 300 DPI PNGs directly —
  # no iframe, no second toolbar, no "Download failed" overlay. The
  # PNG path covers the same fidelity needs without the chrome OnlyOffice
  # imposed. Backend container can be removed entirely.

  # ---------------------------------------------------------------------
  # 2026-Q2 model-challenger bench sidecars (plans/stateful-marinating-whistle.md)
  # All gated behind `profiles: [bench]` (or [bench-scratch] for the
  # community-1 SM_121 smoke check) so they never auto-start with the
  # production stack.  Bring up explicitly with:
  #   docker compose --profile bench up -d <service>
  # Production services on 8001/8002/8003/8012 stay untouched.
  # ---------------------------------------------------------------------

  # Track A — Cohere Transcribe (Apache 2.0, 2026-03-26).
  cohere-transcribe:
    profiles: ["bench"]
    image: cohere-transcribe:bench
    build:
      context: containers/cohere-transcribe
      args:
        COHERE_REVISION: ${COHERE_REVISION:-}
    container_name: scribe-bench-cohere-transcribe
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 8g
    ulimits:
      memlock: -1
    volumes:
      - ${HF_CACHE_DIR:-/data/huggingface}:/root/.cache/huggingface
    environment:
      - ASR_PORT=8013
      - COHERE_MODEL_ID=${COHERE_MODEL_ID:-CohereLabs/cohere-transcribe-03-2026}
      - COHERE_REVISION=${COHERE_REVISION:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
    restart: "no"  # Bench-only; do not auto-restart.
    labels:
      - "autoheal=false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # Track B — Fun-CosyVoice3.5 (Apache 2.0, Tongyi 2026-03-02).
  # Port 8024.
  funcosyvoice:
    profiles: ["bench"]
    image: funcosyvoice:bench
    build:
      context: containers/funcosyvoice
      args:
        COSY_REVISION: ${COSY_REVISION:-}
    container_name: scribe-bench-funcosyvoice
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 8g
    ulimits:
      memlock: -1
    volumes:
      - ${HF_CACHE_DIR:-/data/huggingface}:/root/.cache/huggingface
    environment:
      - TTS_PORT=8024
      - COSY_MODEL_ID=${COSY_MODEL_ID:-FunAudioLLM/CosyVoice3.5}
      - COSY_REVISION=${COSY_REVISION:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
    restart: "no"
    labels:
      - "autoheal=false"
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "25", "http://localhost:8024/health"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 240s

  # (Track C bench sidecars removed 2026-04-28 — production
  # pyannote-diarize on 8001 IS community-1 now, so the parallel bench
  # sidecars are redundant.  Keep the cohere-transcribe / funcosyvoice
  # bench sidecars above for the open ASR / TTS challenger work that
  # has not yet promoted.)

  # Auto-heal: restarts any container Docker marks unhealthy.
  # Combined with CUDA health checks in diarize/TTS, a GPU-broken
  # container gets restarted within ~45s automatically.
  autoheal:
    image: willfarrell/autoheal
    container_name: scribe-autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=15
      - AUTOHEAL_START_PERIOD=300
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
