# meeting-scribe GB10 model stack
#
# Translation uses the shared autosre vLLM model on port 8010
# (Intel/Qwen3.5-35B-A3B-int4-AutoRound, managed by `autosre start`).
# This compose only manages ASR, diarization, and TTS.
#
# Memory budget (single GB10, 128GB):
#   Shared model (INT4-AutoRound, port 8010):   ~24GB (managed by autosre)
#   ASR (Qwen3-ASR-1.7B):                      ~12GB
#   Diarization (pyannote):                     ~4GB
#   TTS (Qwen3-TTS-0.6B):                      ~2.5GB
#   Total:                                      ~43GB
#
# Port allocation (host networking):
#   8001 — Diarization (pyannote.audio)
#   8002 — TTS (faster-qwen3-tts, Qwen3-TTS-12Hz-0.6B-Base)
#   8003 — ASR (vLLM, Qwen3-ASR-1.7B)
#   8010 — Shared model: translation + coding (autosre, not in this compose)
#
# Offline mode:
#   All containers set HF_HUB_OFFLINE=1 + TRANSFORMERS_OFFLINE=1 so they
#   NEVER phone home to HuggingFace. Models must be pre-cached in
#   $HF_CACHE_DIR (default /data/huggingface) via `meeting-scribe gb10 pull-models`.
#
# Usage:
#   autosre start --scribe    # Starts everything (shared model + containers + UI)
#   docker compose -f docker-compose.gb10.yml up -d  # Containers only

services:
  # Speaker Diarization — pyannote.audio (aarch64/Blackwell compatible)
  pyannote-diarize:
    image: pyannote-diarize:latest
    build:
      context: containers/pyannote
    container_name: scribe-diarization
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    volumes:
      - ${HF_CACHE_DIR:-/data/huggingface}:/root/.cache/huggingface
    environment:
      - DIARIZE_PORT=8001
      - DIARIZE_MAX_SPEAKERS=4
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s

  # Interpretation Audio TTS — Qwen3-TTS via faster-qwen3-tts (CUDA graph optimized)
  # Two replicas on 8002 and 8012 so scribe-main can round-robin synth requests.
  # Each replica is ~1.2 GB in bf16; the GB10's 96 GB unified memory fits both
  # trivially, and the autoregressive decode loop is single-sequence-per-model,
  # so process-level parallelism is the simplest way to double throughput.
  qwen3-tts:
    image: scribe-tts:latest
    build:
      context: containers/tts
    container_name: scribe-tts
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    volumes:
      - ${HF_CACHE_DIR:-/data/huggingface}:/root/.cache/huggingface
    environment:
      - TTS_PORT=8002
      # Use the Base variant (not CustomVoice) — the 0.6B CustomVoice
      # weights ship with a broken `generate_custom_voice` path that raises
      # `does not support create_voice_clone_prompt` on every named-speaker
      # request, so every TTS synthesis returns 500. Base has no named
      # speakers but the container falls through to reference-audio
      # synthesis using default_voice.wav (or any cached enrolled voice),
      # which works.
      - TTS_MODEL=${TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-0.6B-Base}
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    restart: unless-stopped
    # Tell autoheal NOT to monitor this container. The TTS container does
    # synchronous PyTorch CUDA work that holds the Python GIL during
    # synthesis bursts, which makes /health take >5 s to respond. Autoheal
    # interpreted those slow probes as "unhealthy" and force-restarted the
    # container every 5–10 minutes mid-meeting, killing TTS the moment a
    # listener actually started consuming audio. We rely on Docker's own
    # `restart: unless-stopped` for genuine crashes; autoheal can stay
    # responsible for diarize / asr where the workload is stateless and
    # /health is never blocked.
    labels:
      - "autoheal=false"
    healthcheck:
      # Generous timeouts to ride out CUDA-busy moments. The healthcheck
      # exists only to surface "container is genuinely dead" — it must
      # never fire while the model is just slow.
      test: ["CMD", "curl", "-f", "--max-time", "25", "http://localhost:8002/health"]
      interval: 30s
      timeout: 30s
      retries: 6
      start_period: 180s

  qwen3-tts-2:
    image: scribe-tts:latest
    build:
      context: containers/tts
    container_name: scribe-tts-2
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    volumes:
      - ${HF_CACHE_DIR:-/data/huggingface}:/root/.cache/huggingface
    environment:
      - TTS_PORT=8012
      # See the qwen3-tts service above for why we use the Base variant.
      - TTS_MODEL=${TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-0.6B-Base}
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    restart: unless-stopped
    # Same autoheal exclusion as qwen3-tts — see comment there for the
    # full reason. Autoheal was force-restarting this container during
    # synthesis bursts and killing TTS mid-meeting.
    labels:
      - "autoheal=false"
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "25", "http://localhost:8012/health"]
      interval: 30s
      timeout: 30s
      retries: 6
      start_period: 180s

  # vllm-omni TTS (migration target — Phase 2 of the TTS rewrite).
  # Single continuous-batching instance replaces qwen3-tts + qwen3-tts-2.
  # Starts on port 8022 while the legacy 8002/8012 replicas remain up so
  # the two stacks can run side-by-side through the Phase 1b load test and
  # user acceptance window. Flip `SCRIBE_TTS_VLLM_URL=http://localhost:8022`
  # in the scribe-main env to route synthesis to the new instance.
  #
  # Enable:  docker compose --profile vllm-omni up -d vllm-tts
  vllm-tts:
    profiles: ["vllm-omni"]
    image: scribe-tts-vllm:latest
    build:
      context: containers/tts-vllm
    container_name: scribe-tts-vllm
    network_mode: host
    # Phase 1a hardening (supply-chain + sandbox): read_only is disabled
    # during the parallel-run period because numba/librosa JIT needs a
    # writable site-packages path. Re-enable before acceptance cutover
    # by baking `NUMBA_CACHE_DIR=/tmp/numba` + `HF_HOME=/tmp/hf` into the
    # image and adding both to the tmpfs list.
    tmpfs:
      # torchinductor + triton write .so files to /tmp/torchinductor_* and
      # mmap them back — default docker tmpfs is noexec, which blocks that.
      - /tmp:exec,size=4g
      - /root/.cache/vllm:exec,size=4g
    cap_drop: ["ALL"]
    security_opt:
      - "no-new-privileges:true"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    # Model is baked into the image at a pinned HF revision; no hub access
    # at runtime (HF_HUB_OFFLINE=1). We mount nothing from the host.
    entrypoint: ["vllm"]
    command:
      - serve
      - /models/qwen3-tts-1.7b
      - --stage-configs-path
      - /opt/stage_configs/qwen3_tts.yaml
      - --omni
      - --port
      - "8022"
      - --trust-remote-code
      - --enforce-eager
    volumes:
      # Override the stage config baked into the image so per-stage
      # gpu_memory_utilization=0.1 fits alongside the 35B translator +
      # legacy TTS replicas. Remove this mount once the production
      # Dockerfile rebuilds with the patched config in src/meeting_scribe/.
      - ./src/meeting_scribe/stage_configs/qwen3_tts.yaml:/opt/stage_configs/qwen3_tts.yaml:ro
    environment:
      - TTS_PORT=8022
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
    # Long start_period: vllm-omni 2-stage load + torch.compile + warmup
    # measured at ~4 min cold on GB10 aarch64; first-run kernel cache
    # pushes it higher. labels.autoheal="false" keeps autoheal hands off.
    labels:
      autoheal: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8022/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 600s

  # Unified Omni (ASR + TTS + translate in one vllm-omni instance).
  # Consolidation spike per plan `vLLM Consolidation + Omni Spike`.
  # Parallel-run only — dedicated scribe-asr / scribe-tts(-vllm) /
  # translate-on-35B stay alive until per-modality Phase C gates pass
  # AND user acceptance stamps in containers/omni/ACCEPTANCE.md.
  #
  # Enable: docker compose --profile omni-spike up -d omni-unified
  omni-unified:
    profiles: ["omni-spike"]
    image: scribe-omni:spike
    build:
      context: containers/omni
      args:
        HF_MODEL_REVISION: "26291f793822fb6be9555850f06dfe95f2d7e695"
    container_name: scribe-omni-unified
    network_mode: host
    read_only: true
    tmpfs:
      # torchinductor + triton write .so files to /tmp/torchinductor_* and
      # mmap them back — default docker tmpfs is noexec, which blocks that.
      - /tmp:exec,size=4g
      - /root/.cache/vllm:exec,size=4g
    cap_drop: ["ALL"]
    security_opt:
      - "no-new-privileges:true"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    environment:
      - OMNI_PORT=8032
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8032/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 300s

  # ASR — Qwen3-ASR-1.7B via vLLM
  vllm-asr:
    image: ${SCRIBE_VLLM_IMAGE:-ghcr.io/bjk110/vllm-spark:turboquant}
    container_name: scribe-asr
    entrypoint: []
    command:
      - /bin/bash
      - -c
      - >
        vllm serve Qwen/Qwen3-ASR-1.7B
        --host 0.0.0.0
        --port 8003
        --tensor-parallel-size 1
        --max-model-len 4096
        --gpu-memory-utilization 0.10
        --max-num-seqs 4
        --enforce-eager
        --load-format fastsafetensors
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    volumes:
      - ${HF_CACHE_DIR:-/data/huggingface}:/root/.cache/huggingface
    environment:
      - NVIDIA_DISABLE_REQUIRE=1
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # OnlyOffice DocumentServer (removed 2026-04-17). The popout slide
  # viewer now uses the meeting-scribe-rendered 300 DPI PNGs directly —
  # no iframe, no second toolbar, no "Download failed" overlay. The
  # PNG path covers the same fidelity needs without the chrome OnlyOffice
  # imposed. Backend container can be removed entirely.

  # Auto-heal: restarts any container Docker marks unhealthy.
  # Combined with CUDA health checks in diarize/TTS, a GPU-broken
  # container gets restarted within ~45s automatically.
  autoheal:
    image: willfarrell/autoheal
    container_name: scribe-autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=15
      - AUTOHEAL_START_PERIOD=300
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
