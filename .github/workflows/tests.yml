name: Tests & Lint
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Nightly full lane runs as a CI backstop in case the local GB10
    # cron hasn't run. Failures don't block PRs.
    - cron: "17 9 * * *"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: python scripts/check_secrets.py
      # Whole-repo style validators — used to live in the local
      # ``.githooks/pre-commit`` only. Promoting to CI keeps them
      # enforced after the BMAT-style stage split that moved them off
      # the per-commit hook (where they were blocking unrelated
      # one-file commits on pre-existing tech debt).
      - run: python scripts/check_ui_style.py
      - run: python scripts/validate_how_it_works.py
      # Tailwind v4 build freshness gate. The standalone CLI binary is
      # cached by pinned version, so only the first run on a fresh
      # cache pays the ~120 MB download cost. `--mode check` writes a
      # candidate build to a temp dir and byte-compares against the
      # committed static/css/dist/* and HTML cache-bust ?v= stamps —
      # never mutates the worktree. Fails if committed artifacts are
      # stale relative to source.
      - name: Tailwind binary cache
        uses: actions/cache@v4
        with:
          path: .tools
          key: tailwindcss-${{ runner.os }}-${{ runner.arch }}-v4.3.0
      - name: Install Tailwind v4 binary (cached after first run)
        run: python scripts/install_tailwind.py
      - name: CSS build freshness check
        run: python scripts/build_css.py --mode check

  # Smoke lane — every push + PR. Target: ≤ 3 min.
  # Pure unit tests + JS unit suite. Markers `integration` and `browser`
  # are excluded by default via pyproject.toml `addopts`.
  # Runs in parallel with `lint` (lint is fast enough that any breakage
  # surfaces before this finishes).
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: pip install -e ".[dev]"
      - name: Marker-orphan check
        run: python scripts/hooks/check_marker_orphans.py
      - name: Pytest unit suite + coverage gate
        # Run serially. Two tests are race-sensitive under xdist
        # auto-parallel (test_probe_fail_then_success_with_auto_recreate
        # uses an AsyncMock against the sync compose_restart called
        # via asyncio.to_thread, and test_missing_profile_triggers_first_run_bootstrap
        # depends on subprocess state-file ordering that xdist worker
        # scheduling can disrupt). Serial runs in ~65s on a Github
        # runner — fast enough that parallelizing isn't worth the
        # flakiness.
        #
        # `scripts/run_coverage_gate.py` runs pytest under coverage
        # with the cheap unit-only marker filter, parses the TOTAL row,
        # and fails if the percentage drops below the floor pinned in
        # `.ci/coverage-floor`. The single source of truth for the
        # threshold lives in that file — no `--cov-fail-under=NN`
        # scattered across this workflow.
        run: python scripts/run_coverage_gate.py
      - name: JS unit suite
        # `node --test <dir>` only walks for *.test.js/cjs/mjs in some
        # versions; pass an explicit glob so we get every .test.mjs
        # without depending on Node's directory-walk behavior.
        run: node --test tests/js/*.test.mjs

  # Security lane — every push + PR. Catches known CVEs in the resolved
  # dep tree at PR time, before the weekly Dependabot batch surfaces.
  # Hard-fails on HIGH+ severity in pip OR npm. Soft-warns on moderate
  # (don't block the queue on every quarterly minor advisory).
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: pip install -e ".[dev]" pip-audit
      - name: pip-audit (any advisory fails the build)
        # pip-audit exits non-zero on ANY known advisory in the resolved
        # tree; there is no severity threshold. The Dependabot weekly run
        # (.github/dependabot.yml) is the patching mechanism — this lane
        # is the gate that keeps a vulnerable tree from merging into dev
        # while a Dependabot PR is still open.
        #
        # Ignore pip's own CVEs (CVE-2026-3219, CVE-2026-6357 — both
        # in pip 26.0.1): pip is the package manager, not a runtime
        # dep we ship. The runner's pre-installed pip is whatever
        # ``actions/setup-python@v6`` ships with; we don't pick it.
        # Re-evaluate when the action's pin moves past the fix.
        run: pip-audit --strict --vulnerability-service osv --ignore-vuln=CVE-2026-3219 --ignore-vuln=CVE-2026-6357
      - name: npm audit overlay (moderate+ fails the build)
        working-directory: overlay
        # Tightened from --audit-level=high to moderate so non-critical
        # advisories also block. The overlay tree is small (Electron +
        # transitive), so noise from low-sev findings is bounded.
        # No package-lock yet (Electron is the only direct dep), so use
        # --omit=dev with audit-level to gate. Generates a lockfile on
        # the fly if one is missing.
        run: |
          if [ -f package-lock.json ]; then
            npm audit --audit-level=moderate --omit=dev
          else
            npm install --package-lock-only
            npm audit --audit-level=moderate --omit=dev
          fi

  # Browser lane runs in `nightly-full` only — too expensive to gate every
  # push (chromium download ~250 MB, total ~3 min). Operators run it
  # locally before a frontend or audio-pipeline change with
  # ``CI_LOCAL_FULL=1 git push`` (see scripts/ci_local.py + .githooks/pre-push).

  # Nightly full lane — cron only. Backstop in case GB10 cron didn't run.
  # Failures here don't block the smoke status check that gates PRs.
  # The nightly run is also where the Playwright browser-smoke regression
  # gets exercised in CI (it's not on the per-push critical path).
  nightly-full:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    needs: [lint, smoke]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: pip install -e ".[dev]"
      - run: playwright install --with-deps chromium webkit
      - name: Integration suite
        run: PYTHONPATH=src pytest tests/ -v --tb=short -m integration
      - name: Full browser suite (mobile + WebKit + visual)
        run: PYTHONPATH=src pytest tests/browser/ -v --tb=short -m browser
      - name: Stateful + replay (slow)
        run: PYTHONPATH=src pytest tests/ -v --tb=short -m slow
