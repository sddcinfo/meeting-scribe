name: Tests & Lint
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Nightly full lane runs as a CI backstop in case the local GB10
    # cron hasn't run. Failures don't block PRs.
    - cron: "17 9 * * *"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: python scripts/check_secrets.py

  # Smoke lane — every push + PR. Target: ≤ 3 min.
  # Pure unit tests + JS unit suite. Markers `integration` and `browser`
  # are excluded by default via pyproject.toml `addopts`.
  # Runs in parallel with `lint` (lint is fast enough that any breakage
  # surfaces before this finishes).
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pip install -e ".[dev]"
      - name: Marker-orphan check
        run: python scripts/hooks/check_marker_orphans.py
      - name: Pytest unit suite
        # Run serially. Two tests are race-sensitive under xdist
        # auto-parallel (test_probe_fail_then_success_with_auto_recreate
        # uses an AsyncMock against the sync compose_restart called
        # via asyncio.to_thread, and test_missing_profile_triggers_first_run_bootstrap
        # depends on subprocess state-file ordering that xdist worker
        # scheduling can disrupt). Serial runs in ~65s on a Github
        # runner — fast enough that parallelizing isn't worth the
        # flakiness.
        run: PYTHONPATH=src pytest tests/ --tb=short
      - name: JS unit suite
        # `node --test <dir>` only walks for *.test.js/cjs/mjs in some
        # versions; pass an explicit glob so we get every .test.mjs
        # without depending on Node's directory-walk behavior.
        run: node --test tests/js/*.test.mjs

  # Security lane — every push + PR. Catches known CVEs in the resolved
  # dep tree at PR time, before the weekly Dependabot batch surfaces.
  # Hard-fails on HIGH+ severity in pip OR npm. Soft-warns on moderate
  # (don't block the queue on every quarterly minor advisory).
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pip install -e ".[dev]" pip-audit
      - name: pip-audit (HIGH+ fails the build)
        # `pip` itself is the package manager, not a runtime dep we ship.
        # Ignore CVE-2026-3219 (pip 26.0.1) — it can't be reached from
        # meeting-scribe code, only from operators running pip locally.
        # Re-evaluate when CI pip is bumped past the fix.
        run: pip-audit --strict --vulnerability-service osv --ignore-vuln=CVE-2026-3219
      - name: npm audit overlay (HIGH+ fails the build)
        working-directory: overlay
        # No package-lock yet (Electron is the only direct dep), so use
        # --omit=dev with audit-level to gate. Falls back to soft-warn
        # if no lockfile is present at all.
        run: |
          if [ -f package-lock.json ]; then
            npm audit --audit-level=high --omit=dev
          else
            npm install --package-lock-only
            npm audit --audit-level=high --omit=dev
          fi

  # Browser lane — every push + PR. Adds ~3 min.
  # Runs the cross-window-sync subset that's load-bearing for the
  # popout↔admin regression class. Full Playwright suite runs in nightly.
  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      # Cache Playwright's downloaded browser binaries — chromium alone
      # is ~250 MB and takes ~2 min to install. Keyed on the playwright
      # version pinned by [dev], so a bump invalidates automatically.
      - name: Playwright version
        id: pw-version
        run: |
          v=$(python -c "import importlib.metadata as m; print(m.version('playwright'))")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium
      - if: steps.pw-cache.outputs.cache-hit == 'true'
        # Browsers came from cache, but system deps (libnss, etc.) still
        # need apt. `--with-deps` without the browser download is the
        # supported shape for this case.
        run: playwright install-deps chromium
      - name: Browser smoke (cross-window sync + handler coverage)
        run: PYTHONPATH=src pytest tests/browser/ -v --tb=short -m browser
      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-trace
          path: test-results/
          # Snapshot images (visual regression) are pre-masked; raw
          # journal data is gitignored. Per-job artifact firewall:
          # we exclude any path that could carry transcript content.
          if-no-files-found: ignore

  # Nightly full lane — cron only. Backstop in case GB10 cron didn't run.
  # Failures here don't block the smoke status check that gates PRs.
  nightly-full:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    needs: [lint, smoke, browser-smoke]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pip install -e ".[dev]"
      - run: playwright install --with-deps chromium webkit
      - name: Integration suite
        run: PYTHONPATH=src pytest tests/ -v --tb=short -m integration
      - name: Full browser suite (mobile + WebKit + visual)
        run: PYTHONPATH=src pytest tests/browser/ -v --tb=short -m browser
      - name: Stateful + replay (slow)
        run: PYTHONPATH=src pytest tests/ -v --tb=short -m slow
