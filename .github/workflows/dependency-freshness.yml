name: Dependency freshness

# Weekly stale-pin + model-drift check.  Runs Mondays 08:00 UTC; can
# also be triggered manually via the Actions tab.  Non-blocking — opens
# (or updates) a single tracking issue when:
#   * ≥ 1 PyPI pin is ≥ 30 days behind the latest stable release, OR
#   * ≥ 1 pinned HF model has a newer sibling in its family glob, OR
#   * ≥ 1 closed-source TTS / Omni candidate just opened weights.
# Never auto-bumps.
#
# Promotion path for any flagged item follows
# `reports/2026-Q2-bench/2026-Q2-RETROSPECTIVE.md` Tier 1 / Tier 2.

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install packaging huggingface_hub pyyaml

      - id: pypi
        run: |
          set +e
          python scripts/bench/check_stale_pins.py \
              --report /tmp/stale-pins.md --stale-days 30
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - id: models
        run: |
          set +e
          python scripts/bench/check_model_drift.py \
              --report /tmp/model-drift.md --stale-days 30
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Combine reports
        run: |
          {
            cat /tmp/stale-pins.md 2>/dev/null || echo "(stale-pins report missing)"
            echo
            echo "---"
            echo
            cat /tmp/model-drift.md 2>/dev/null || echo "(model-drift report missing)"
          } > /tmp/freshness-combined.md

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-freshness
          path: |
            /tmp/stale-pins.md
            /tmp/model-drift.md
            /tmp/freshness-combined.md

      - name: Open or update tracking issue
        if: steps.pypi.outputs.exit_code == '1' || steps.models.outputs.exit_code == '1'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/freshness-combined.md', 'utf8');
            const title_prefix = 'Dependency freshness — drift detected';
            const today = new Date().toISOString().slice(0, 10);
            const title = `${title_prefix} (${today})`;

            // Find an existing open issue with our prefix; reuse it.
            const existing = await github.paginate(
              github.rest.issues.listForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'dependency-freshness' }
            );
            const match = existing.find(i => i.title.startsWith(title_prefix) || i.title.startsWith('Dependency freshness — stale pins detected'));
            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: match.number, title, body,
              });
              core.notice(`Updated existing freshness issue #${match.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['dependency-freshness'],
              });
              core.notice(`Opened freshness issue #${created.data.number}`);
            }
