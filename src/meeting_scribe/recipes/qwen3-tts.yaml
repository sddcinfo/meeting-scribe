# Qwen3-TTS — interpretation audio synthesis (faster-qwen3-tts)
# GB10 reliability mode uses one resident replica on 8002. The backend can
# still round-robin an explicitly configured comma-separated pool, but two
# resident TTS models were removed from the default stack after 2026-05-09
# live tests showed higher CUDA-OOM risk with ASR + translation + diarization.

model_key: tts
model_id: Qwen/Qwen3-TTS-12Hz-0.6B-Base
short_name: Qwen3-TTS-0.6B
description: "Multilingual TTS for the 10 TTS-capable language pairs"
# weights: ~3-4 GB    # model + CUDA graph/KV/audio buffers

mode: solo
tensor_parallel: 1
port: 8002

# Custom container (not vLLM) — runs faster-qwen3-tts with CUDA graph
# capture for ~10x throughput vs eager mode.
docker_image: scribe-tts:latest
container_type: faster-qwen3-tts

capabilities:
  languages: 10
  output_sample_rate_hz: 12000
  active_params: "0.6B"
  total_params: "0.6B"

best_for: "Real-time interpretation audio for hotspot guests"
