<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Scribe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Noto+Sans+JP:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="grain-overlay" aria-hidden="true"></div>

  <header>
    <div class="header-left">
      <button class="hamburger" id="btn-hamburger" title="Meetings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="logo-mark" aria-hidden="true">
        <div class="pulse-ring"></div>
        <div class="pulse-core"></div>
      </div>
      <div class="header-text">
        <h1>Meeting Scribe</h1>
        <span class="header-subtitle" id="status-line">Initializing...</span>
      </div>
    </div>
    <div class="header-right">
      <div class="backend-pills" id="backend-pills"></div>
      <div class="analytics-bar" id="analytics-bar">
        <span class="metric" id="metric-audio">0s</span>
        <span class="metric" id="metric-asr">0 e/s</span>
        <span class="metric" id="metric-finals">0 final</span>
        <span class="metric" id="metric-trans">0/0</span>
        <span class="metric" id="metric-avg-trans"></span>
      </div>
      <div class="audio-meter" id="audio-meter">
        <div class="meter-bar" id="meter-bar"></div>
      </div>
      <a href="/how-it-works" class="pill" style="text-decoration:none; color:var(--text-muted);">How it works</a>
    </div>
  </header>

  <!-- Meetings panel (slide-over, toggled by hamburger) -->
  <div class="meetings-panel" id="meetings-panel">
    <div class="meetings-header">
      <h3>Meetings</h3>
      <button id="btn-new-meeting" class="btn-ghost">+ New</button>
    </div>
    <div class="meetings-list" id="meetings-list"></div>
  </div>
  <div class="meetings-backdrop" id="meetings-backdrop"></div>

  <main>
    <!-- ═══ SETUP MODE ═══ -->
    <div id="room-setup" class="room-setup">
      <div class="room-canvas" id="room-canvas"></div>
      <div class="setup-footer">
        <div class="preset-selector" id="preset-selector">
          <button class="preset-btn" data-preset="boardroom" title="Boardroom">
            <svg width="18" height="12" viewBox="0 0 18 12"><ellipse cx="9" cy="6" rx="8" ry="5" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
          <button class="preset-btn" data-preset="round" title="Round">
            <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="6" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
          <button class="preset-btn" data-preset="square" title="Square">
            <svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="1" width="12" height="12" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
          <button class="preset-btn active" data-preset="rectangle" title="Rectangle">
            <svg width="18" height="12" viewBox="0 0 18 12"><rect x="1" y="1" width="16" height="10" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
          <button class="preset-btn" data-preset="classroom" title="Classroom">
            <svg width="16" height="12" viewBox="0 0 16 12"><rect x="1" y="1" width="14" height="2" rx="1" fill="currentColor" opacity="0.3"/><circle cx="4" cy="7" r="1.5" fill="currentColor"/><circle cx="8" cy="7" r="1.5" fill="currentColor"/><circle cx="12" cy="7" r="1.5" fill="currentColor"/></svg>
          </button>
          <button class="preset-btn" data-preset="u_shape" title="U-Shape">
            <svg width="14" height="12" viewBox="0 0 14 12"><path d="M2 2v8h10V2" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </button>
          <button class="preset-btn" data-preset="pods" title="Pods">
            <svg width="16" height="12" viewBox="0 0 16 12"><rect x="1" y="1" width="5" height="4" rx="1" fill="none" stroke="currentColor" stroke-width="0.8"/><rect x="10" y="1" width="5" height="4" rx="1" fill="none" stroke="currentColor" stroke-width="0.8"/><rect x="1" y="7" width="5" height="4" rx="1" fill="none" stroke="currentColor" stroke-width="0.8"/><rect x="10" y="7" width="5" height="4" rx="1" fill="none" stroke="currentColor" stroke-width="0.8"/></svg>
          </button>
          <button class="preset-btn" data-preset="freeform" title="Free-form">
            <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="3" cy="4" r="1.5" fill="currentColor"/><circle cx="10" cy="3" r="1.5" fill="currentColor"/><circle cx="6" cy="9" r="1.5" fill="currentColor"/><circle cx="11" cy="11" r="1.5" fill="currentColor"/></svg>
          </button>
        </div>
        <button id="btn-add-table" class="btn-add-seat" title="Add table">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="18" height="12" rx="3"/><path d="M12 10v4M10 12h4"/></svg>
          Table
        </button>
        <button id="btn-add-seat" class="btn-add-seat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Seat
        </button>
        <div class="setup-hint" id="setup-hint">Enroll each speaker's voice to begin</div>
        <button id="btn-start-meeting" class="btn-start-meeting">
          Start Meeting
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
      </div>
    </div>

    <!-- ═══ MEETING MODE ═══ -->
    <div id="meeting-mode" style="display:none">
      <!-- Compact table + speakers strip -->
      <div class="meeting-table-strip" id="meeting-table-strip"></div>

      <!-- Control bar -->
      <div class="control-bar" id="control-bar">
        <button id="btn-record" class="btn-record" aria-label="Stop recording">
          <span class="btn-record-icon"></span>
          <span class="btn-record-label"></span>
        </button>
        <div class="control-meta">
          <span class="timer" id="timer">00:00</span>
          <span class="segment-count" id="segment-count">0 segments</span>
        </div>
        <div class="control-actions">
          <button id="btn-clear" class="btn-ghost" title="Clear transcript">Clear</button>
        </div>
      </div>

      <!-- 3-column transcript (unified grid for row alignment) -->
      <div class="transcript-columns">
        <div class="transcript-col-headers">
          <div class="col-header">
            <span class="col-header-label">Live</span>
            <span class="col-header-hint">All languages</span>
          </div>
          <div class="col-header">
            <span class="col-header-label">English</span>
            <span class="col-header-hint">EN original + JA→EN</span>
          </div>
          <div class="col-header">
            <span class="col-header-label">日本語</span>
            <span class="col-header-hint">JA原文 + EN→JA</span>
          </div>
        </div>
        <div class="transcript-grid-scroll" id="transcript-grid"></div>
      </div>
    </div>

    <!-- ═══ VIEW MODE (past meeting) ═══ -->
    <div id="view-mode" style="display:none">
      <div class="transcript-columns">
        <div class="transcript-col">
          <div class="col-header"><span class="col-header-label">Transcript</span></div>
          <div class="col-scroll" id="view-scroll">
            <div class="transcript-empty" id="view-empty">
              <p>Select a meeting from the sidebar</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Audio player bar (bottom of screen for past meeting review) -->
  <div class="player-bar" id="player-bar" style="display:none">
    <button class="player-play" id="player-play">▶</button>
    <span class="player-time" id="player-current">00:00</span>
    <input type="range" class="player-scrub" id="player-scrub" min="0" max="100" value="0" step="0.1">
    <span class="player-time" id="player-duration">00:00</span>
    <select class="player-speed" id="player-speed">
      <option value="1">1x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
    </select>
  </div>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal-card" id="modal-card"></div>
  </div>

  <script type="module" src="/static/js/scribe-app.js"></script>
</body>
</html>
