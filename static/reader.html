<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Meeting Scribe | Reader</title>
  <style>
    :root {
      --bg:        #faf9f6;
      --surface:   #ffffff;
      --border:    #e8e6e1;
      --text:      #1a1a1e;
      --text-dim:  #6a6a72;
      --text-muted:#9a9aa2;
      --accent-a:  #1a6fb5;
      --accent-b:  #c45d20;
      --font-ui:  -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      --font-ja:  'Hiragino Kaku Gothic ProN', 'Noto Sans CJK JP', 'Noto Sans JP', 'Yu Gothic', sans-serif;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left:   env(safe-area-inset-left, 0px);
      --safe-right:  env(safe-area-inset-right, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
    }

    .root {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* Top bar */
    .bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.35rem 1rem;
      padding-left: calc(1rem + var(--safe-left));
      padding-right: calc(1rem + var(--safe-right));
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .bar .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #dc2626;
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    .bar .dot.idle { background: #ccc; animation: none; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .bar .title {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .bar .lang-label {
      margin-left: auto;
      font-size: 0.65rem;
      color: var(--text-muted);
    }
    .bar .dir-btn {
      font-family: var(--font-ui);
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text-dim);
      cursor: pointer;
      line-height: 1;
      white-space: nowrap;
    }

    /* Waiting */
    .waiting {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: var(--text-muted);
    }
    .waiting .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; }
    }

    /* Split pane container */
    .split {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Each pane: label outside scroll, content scrolls */
    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-a { border-right: 1px solid var(--border); }

    .pane-label {
      flex-shrink: 0;
      padding: 0.25rem 1.25rem;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .pane-a .pane-label {
      color: var(--accent-a);
      padding-left: calc(1.25rem + var(--safe-left));
    }
    .pane-b .pane-label {
      color: var(--accent-b);
      padding-right: calc(1.25rem + var(--safe-right));
    }

    .pane-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0.75rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      scroll-behavior: smooth;
    }
    .pane-a .pane-scroll { padding-left: calc(1.25rem + var(--safe-left)); }
    .pane-b .pane-scroll { padding-right: calc(1.25rem + var(--safe-right)); }

    /* Segment */
    .seg {
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .seg-text {
      font-size: calc(clamp(1.5rem, 2.8vw, 2.4rem) * var(--text-scale, 1));
      line-height: 1.4;
      font-weight: 400;
      letter-spacing: -0.01em;
      word-break: break-word;
    }
    .seg-text.ja {
      font-family: var(--font-ja);
      font-size: calc(clamp(1.4rem, 2.6vw, 2.2rem) * var(--text-scale, 1));
    }

    /* Live partial — pinned at bottom of scroll */
    .live {
      font-size: 0.95rem;
      color: var(--text-dim);
      font-style: italic;
      min-height: 1.4em;
      flex-shrink: 0;
    }
    .live:empty { display: none; }

    /* Desktop (1200px+): bigger text, more padding */
    @media (min-width: 1200px) {
      .pane-scroll {
        padding: 1.5rem 2.5rem;
        gap: 0.75rem;
      }
      .seg-text {
        font-size: clamp(2rem, 2.2vw, 3rem);
        line-height: 1.45;
      }
      .seg-text.ja {
        font-size: clamp(1.8rem, 2vw, 2.8rem);
      }
      .pane-label {
        padding: 0.35rem 2.5rem;
        font-size: 0.65rem;
      }
    }

    /* iPad Pro landscape (9.7" → 13"): tighter vertical rhythm so the
       newest line doesn't sit off the bottom of the viewport on 768–
       1032px-tall screens. Covers 9.7"/11" (1194/1210×834) and 13"
       (1376×1032), which otherwise fall into the generic 768–1200
       gap with desktop-sized padding. */
    @media (orientation: landscape) and (min-width: 820px) and (max-width: 1400px) and (max-height: 1100px) {
      .bar {
        padding: 0.5rem 1rem;
        padding-left: calc(1rem + var(--safe-left));
        padding-right: calc(1rem + var(--safe-right));
        min-height: 2.25rem;
      }
      .bar .title { font-size: 0.8rem; }
      .bar .lang-label { font-size: 0.75rem; }
      .bar .dir-btn { font-size: 0.75rem; padding: 0.3rem 0.65rem; }
      .pane-label {
        padding: 0.15rem 1.25rem;
        font-size: 0.55rem;
      }
      .pane-scroll {
        padding: 0.4rem 1.1rem;
        gap: 0.35rem;
      }
      .seg-text {
        font-size: clamp(1.15rem, 1.9vw, 1.75rem);
        line-height: 1.3;
      }
      .seg-text.ja {
        font-size: clamp(1.1rem, 1.8vw, 1.65rem);
      }
      .waiting { font-size: 1rem; }
    }

    /* Monolingual meeting (set on <body> by _initViewer from meeting
       metadata): collapse the translation pane and let the source pane
       claim the whole split. Border-right on pane-a is dropped too so
       the reader doesn't show a divider leading to empty space. */
    body.monolingual .pane-b { display: none; }
    body.monolingual .pane-a { border-right: none; }
    body.monolingual .pane-a .pane-label {
      /* One language, one accent — pane-a keeps its blue label. */
      text-align: left;
    }
    /* On phones the bilingual layout stacks vertically with a
       border-bottom on pane-a; monolingual drops that too. */
    @media (max-width: 768px) {
      body.monolingual .pane-a { border-bottom: none; }
    }

    /* iPhone (440px): stack top/bottom */
    @media (max-width: 768px) {
      .split { flex-direction: column; }
      .pane-a {
        border-right: none;
        border-bottom: 2px solid var(--border);
      }
      .pane-scroll {
        padding: 0.5rem 0.8rem;
        gap: 0.4rem;
      }
      .pane-a .pane-scroll { padding-left: calc(0.8rem + var(--safe-left)); }
      .pane-b .pane-scroll { padding-right: calc(0.8rem + var(--safe-right)); }
      .seg-text {
        font-size: clamp(1.1rem, 4.5vw, 1.5rem);
        line-height: 1.35;
      }
      .seg-text.ja {
        font-size: clamp(1.05rem, 4.2vw, 1.4rem);
      }
      .pane-label {
        font-size: 0.55rem;
        padding: 0.2rem 0.8rem;
      }
    }
  </style>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="root">
    <div class="bar">
      <div class="dot idle" id="r-dot"></div>
      <a href="/" style="text-decoration:none;color:var(--text-muted);font-size:1rem;line-height:1" title="Back to guest view">&larr;</a>
      <span class="title">Reader</span>
      <button type="button" class="dir-btn" id="r-dir-btn" title="Toggle transcript order (newest first / oldest first)"></button>
      <button type="button" class="dir-btn" id="r-text-smaller" title="Decrease text size">A-</button>
      <button type="button" class="dir-btn" id="r-text-larger" title="Increase text size">A+</button>
      <button type="button" class="dir-btn" id="pip-btn" title="Float above other windows (always on top)" style="display:none">Float</button>
      <span class="lang-label" id="r-lang-label"></span>
    </div>

    <div id="slide-viewer-container"></div>

    <div class="waiting" id="r-waiting">
      Waiting for meeting<span class="dots"></span>
    </div>

    <div class="split" id="r-split" style="display:none">
      <div class="pane pane-a">
        <div class="pane-label" id="label-a">Original</div>
        <div class="pane-scroll" id="scroll-a">
          <div class="live" id="live-a"></div>
        </div>
      </div>
      <div class="pane pane-b">
        <div class="pane-label" id="label-b">Translation</div>
        <div class="pane-scroll" id="scroll-b">
          <div class="live" id="live-b"></div>
        </div>
      </div>
    </div>
  </div>

<script src="/static/js/reader-app.js"></script>
</body>
</html>
