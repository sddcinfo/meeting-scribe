<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Scribe — Connected</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f7f4;
      color: #1a1a1e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .check {
      width: 48px; height: 48px;
      background: #22c55e20;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .check svg { color: #16a34a; }
    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 0.85rem; color: #4a4a52; line-height: 1.5; margin-bottom: 20px; }
    .btn {
      display: inline-block;
      background: #1a1a1e;
      color: #fff;
      padding: 12px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .hint {
      font-size: 0.7rem;
      color: #8a8a94;
      margin-top: 16px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>Connected to Meeting Scribe</h1>
    <p>You're on the meeting WiFi network. Open your browser to view the live transcript.</p>
    <a class="btn" id="open-btn" href="/">Open Meeting Scribe</a>
    <p class="hint" id="hint">
      If the button doesn't work, open your browser and go to:<br>
      <strong id="url-display"></strong>
    </p>
  </div>
  <script>
    // Set the URL to the current host
    var url = location.protocol + '//' + location.host + '/';
    document.getElementById('url-display').textContent = url;
    document.getElementById('open-btn').href = url;

    // Dismiss captive portal then open in real browser
    document.getElementById('open-btn').addEventListener('click', function(e) {
      e.preventDefault();
      // Set cookie so next visit goes straight to guest.html
      document.cookie = 'scribe_portal=done;path=/;max-age=86400';
      // Tell the port-80 redirector this client is done — next iOS probe
      // gets "Success" → blue tick → CNA closes
      fetch('http://' + location.hostname + '/captive-dismiss', {mode:'no-cors'}).catch(function(){});
      // Open in real Safari (window.open works from iOS CNA)
      window.open(url, '_blank');
      // Update the UI
      document.querySelector('h1').textContent = 'Opening Safari...';
      document.querySelector('p').textContent = 'You can close this window.';
    });
  </script>
</body>
</html>
