<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Scribe — Live</title>
  <!-- No external fonts — hotspot devices may have no internet access.
       System fonts load instantly: SF Pro (iOS), Roboto (Android),
       Hiragino/Noto Sans CJK for Japanese. -->
  <style>
    :root {
      --bg-deep:    #f8f7f4;
      --bg-surface: #ffffff;
      --bg-raised:  #f2f1ee;
      --border:     #d8d6d0;
      --text-primary:   #1a1a1e;
      --text-secondary: #4a4a52;
      --text-muted:     #8a8a94;
      --font-ui:   -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      --font-ja:   'Hiragino Kaku Gothic ProN', 'Noto Sans CJK JP', 'Noto Sans JP', 'Yu Gothic', sans-serif;
      --font-mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Roboto Mono', monospace;
      --speaker-1: #c45d20;
      --speaker-2: #1a6fb5;
      --speaker-3: #2a8540;
      --speaker-4: #9b2d7b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-ui);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.25rem;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }
    .pulse-ring {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #dc2626;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse-ring.idle { background: var(--text-muted); animation: none; }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }
    header .status { font-size: 0.75rem; color: var(--text-muted); margin-left: auto; }

    /* Language picker */
    .lang-bar {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.35rem 0.5rem;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }
    .lang-bar::-webkit-scrollbar { display: none; }
    .lang-bar label { color: var(--text-secondary); font-size: 0.65rem; flex-shrink: 0; }
    .guest-listen-btn {
      font-family: var(--font-ui); font-size: 0.7rem; padding: 0.2rem 0.5rem;
      border: 1px solid var(--border); border-radius: 6px; background: var(--bg-surface);
      color: var(--text-primary); cursor: pointer; display: flex; align-items: center; gap: 0.2rem;
      white-space: nowrap;
    }
    .guest-listen-btn.active { background: #22c55e20; border-color: #16a34a; color: #16a34a; }
    .guest-select { font-family: var(--font-ui); font-size: 0.7rem; max-width: 120px; }
    .live-bar {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg-raised);
      border-top: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      display: flex; align-items: flex-start; gap: 0.4rem;
      min-height: 2.5rem;
    }
    .live-bar-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #ef4444; flex-shrink: 0; margin-top: 0.35rem;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    @keyframes pulse-dot { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    .seg.no-anim { animation: none; }
    @keyframes seg-enter {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .live-bar-text { flex: 1; line-height: 1.4; }
    /* Newest at top — no auto-scroll button needed */
    .lang-bar select {
      font-family: var(--font-ui);
      font-size: 0.7rem;
      padding: 0.2rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      max-width: 45vw;
      background: var(--bg-surface);
      color: var(--text-primary);
    }

    /* Transcript */
    .transcript {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0.5rem;
      padding-bottom: 0.5rem;
    }
    .seg {
      animation: seg-enter 0.35s ease-out;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--bg-raised);
      animation: fadeIn 0.2s ease;
    }
    .seg.partial { opacity: 0.6; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .seg-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.2rem;
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .seg-speaker {
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
    }
    .seg-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    .seg-text {
      font-size: 0.95rem;
      line-height: 1.55;
    }
    .seg-text.ja { font-family: var(--font-ja); }

    /* Waiting state */
    .waiting {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
    }
    .waiting h2 { font-size: 1.2rem; font-weight: 600; }
    .waiting p { font-size: 0.85rem; color: var(--text-secondary); max-width: 300px; }
    .waiting .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; }
    }
  </style>
</head>
<body>
  <header>
    <div class="pulse-ring" id="pulse"></div>
    <h1>Meeting Scribe</h1>
    <a href="/reader" class="status" style="text-decoration:none;color:inherit" title="Open large-text reader view">Reader ↗</a>
    <span class="status" id="status">Connecting...</span>
  </header>

  <!-- Audio path diagnostic banner — shows the live state of the entire
       guest-side audio chain so we can see exactly where playback dies.
       Hidden until Listen is tapped. -->
  <div id="audio-diag" style="display:none;position:fixed;top:0;left:0;right:0;background:#111;color:#0f0;font-family:monospace;font-size:11px;padding:6px 10px;z-index:10000;border-bottom:1px solid #0f0;line-height:1.5"></div>

  <!-- First-class MSE audio sink. MediaSource is attached at tap time,
       fMP4/AAC fragments are appendBuffer()'d as they arrive over the WS.
       No controls, no autoplay — playback is driven from the Listen tap. -->
  <audio id="guest-audio-el" playsinline preload="none" style="display:none"></audio>

  <!-- Silent-MP3 keeper. Played inside the Listen tap regardless of
       path (MSE or fallback Web Audio) so Safari's audio session is
       promoted to "playback" category — ignores the ringer switch,
       routes to the speaker at full volume. The 0.5s silent MP3 at
       /static/silent-loop.mp3 is generated by scripts/generate_silent_loop.py. -->
  <audio id="guest-audio-session-keeper" playsinline loop preload="auto" style="display:none"
         src="/static/silent-loop.mp3"></audio>

  <div class="lang-bar" id="lang-bar" style="display:none">
    <label for="lang-select">Show:</label>
    <select id="lang-select">
      <option value="all">All languages (side by side)</option>
    </select>
    <button id="btn-dir-guest" class="guest-listen-btn" title="Toggle transcript order (newest first / oldest first)">↑ Newest</button>
    <button id="btn-listen-guest" class="guest-listen-btn" title="Listen to real-time interpretation">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
      </svg>
      Listen
    </button>
    <select id="listen-lang-guest" class="guest-select" style="display:none" title="Interpretation language"></select>
    <select id="listen-mode-guest" class="guest-select" style="display:none">
      <option value="full">Full (translation + original audio)</option>
      <option value="translation">Translation only</option>
    </select>
    <select id="listen-speed-guest" class="guest-select" style="display:none" title="Playback speed">
      <option value="0.75">0.75×</option>
      <option value="1.0" selected>1.0×</option>
      <option value="1.25">1.25×</option>
      <option value="1.5">1.5×</option>
      <option value="1.75">1.75×</option>
      <option value="2.0">2.0×</option>
    </select>
  </div>

  <div class="waiting" id="waiting">
    <div class="pulse-ring" style="width:24px;height:24px"></div>
    <h2>Waiting for meeting to start<span class="dots"></span></h2>
    <p>The live transcript will appear here automatically when the host starts recording.</p>
  </div>

  <div class="live-bar" id="live-bar" style="display:none">
    <div class="live-bar-dot"></div>
    <div class="live-bar-text" id="live-bar-text"></div>
  </div>
  <div class="transcript" id="transcript" style="display:none"></div>

<script src="/static/js/guest-app.js"></script>
</body>
</html>
