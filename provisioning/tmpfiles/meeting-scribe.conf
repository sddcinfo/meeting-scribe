# systemd-tmpfiles config for meeting-scribe runtime paths.
# Installed by bootstrap.sh into /etc/tmpfiles.d/meeting-scribe.conf so
# that /run/meeting-scribe/ is recreated with the right ownership +
# mode after every reboot (tmpfiles run before any service starts).
#
# Format: `Type Path Mode UID GID Age Argument`
#   d = create directory (idempotent)
d /run/meeting-scribe 0750 root meeting-scribe -
