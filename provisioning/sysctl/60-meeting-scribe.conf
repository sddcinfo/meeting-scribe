# Installed by meeting-scribe bootstrap.sh into /etc/sysctl.d/.
# Tunes kernel memory behaviour for an interactive transcription box.
#
# Why these knobs:
#
#   vm.swappiness=10
#     Default Ubuntu value is 60 — heavily biased toward swapping out
#     anonymous pages (the live Python process, vLLM working set, etc.)
#     to keep page cache resident. On a meeting-scribe box that's
#     backwards: the interactive web server's hot pages MUST stay
#     resident or the audio endpoint stalls + the UI lags. 10 keeps
#     swap available as a safety valve under genuine pressure but
#     stops the kernel from preemptively paging out interactive
#     services to satisfy file-cache demand. Symptom this fixes:
#     "audio playback goes choppy when reprocess is running" — caused
#     by the scribe Python process getting paged out under reprocess
#     memory pressure, then having to fault back in on every audio
#     request.
#
# Re-applying: this file is idempotent. bootstrap.sh re-runs are safe.
# To take effect without reboot: ``sudo sysctl --system``.

vm.swappiness = 10
