# meeting-scribe GB10 model stack
#
# Translation uses the shared autosre vLLM model on port 8010
# (Intel/Qwen3.5-35B-A3B-int4-AutoRound, managed by `autosre start`).
# This compose only manages ASR, diarization, and TTS.
#
# Memory budget (single GB10, 128GB):
#   Shared model (INT4-AutoRound, port 8010):   ~24GB (managed by autosre)
#   ASR (Qwen3-ASR-1.7B):                      ~12GB
#   Diarization (pyannote):                     ~4GB
#   TTS (Qwen3-TTS-0.6B):                      ~2.5GB
#   Total:                                      ~43GB
#
# Port allocation (host networking):
#   8001 — Diarization (pyannote.audio)
#   8002 — TTS (faster-qwen3-tts, Qwen3-TTS-12Hz-0.6B-Base)
#   8003 — ASR (vLLM, Qwen3-ASR-1.7B)
#   8010 — Shared model: translation + coding (autosre, not in this compose)
#
# Offline mode:
#   All containers set HF_HUB_OFFLINE=1 + TRANSFORMERS_OFFLINE=1 so they
#   NEVER phone home to HuggingFace. Models must be pre-cached in
#   $HF_CACHE_DIR (default /data/huggingface) via `meeting-scribe gb10 pull-models`.
#
# Usage:
#   autosre start --scribe    # Starts everything (shared model + containers + UI)
#   docker compose -f docker-compose.gb10.yml up -d  # Containers only

services:
  # Speaker Diarization — pyannote.audio (aarch64/Blackwell compatible)
  pyannote-diarize:
    image: pyannote-diarize:latest
    build:
      context: containers/pyannote
    container_name: scribe-diarization
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    volumes:
      - ${HF_CACHE_DIR:-/data/huggingface}:/root/.cache/huggingface
    environment:
      - DIARIZE_PORT=8001
      - DIARIZE_MAX_SPEAKERS=4
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s

  # Interpretation Audio TTS — Qwen3-TTS via faster-qwen3-tts (CUDA graph optimized)
  # Two replicas on 8002 and 8012 so scribe-main can round-robin synth requests.
  # Each replica is ~1.2 GB in bf16; the GB10's 96 GB unified memory fits both
  # trivially, and the autoregressive decode loop is single-sequence-per-model,
  # so process-level parallelism is the simplest way to double throughput.
  qwen3-tts:
    image: scribe-tts:latest
    build:
      context: containers/tts
    container_name: scribe-tts
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    volumes:
      - ${HF_CACHE_DIR:-/data/huggingface}:/root/.cache/huggingface
    environment:
      - TTS_PORT=8002
      - TTS_MODEL=${TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice}
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s

  qwen3-tts-2:
    image: scribe-tts:latest
    build:
      context: containers/tts
    container_name: scribe-tts-2
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    volumes:
      - ${HF_CACHE_DIR:-/data/huggingface}:/root/.cache/huggingface
    environment:
      - TTS_PORT=8012
      - TTS_MODEL=${TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice}
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s

  # vllm-omni TTS (migration target — Phase 2 of the TTS rewrite).
  # Single continuous-batching instance replaces qwen3-tts + qwen3-tts-2.
  # Starts on port 8022 while the legacy 8002/8012 replicas remain up so
  # the two stacks can run side-by-side through the Phase 1b load test and
  # user acceptance window. Flip `SCRIBE_TTS_VLLM_URL=http://localhost:8022`
  # in the scribe-main env to route synthesis to the new instance.
  #
  # Enable:  docker compose --profile vllm-omni up -d vllm-tts
  vllm-tts:
    profiles: ["vllm-omni"]
    image: scribe-tts-vllm:latest
    build:
      context: containers/tts-vllm
    container_name: scribe-tts-vllm
    network_mode: host
    # Phase 1a hardening (supply-chain + sandbox):
    read_only: true
    tmpfs:
      - /tmp
      - /root/.cache/vllm
    cap_drop: ["ALL"]
    security_opt:
      - "no-new-privileges:true"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    # Model is baked into the image at a pinned HF revision; no hub access
    # at runtime (HF_HUB_OFFLINE=1). We mount nothing from the host.
    environment:
      - TTS_PORT=8022
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,expandable_segments:False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8022/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 180s

  # ASR — Qwen3-ASR-1.7B via vLLM
  vllm-asr:
    image: ${SCRIBE_VLLM_IMAGE:-ghcr.io/bjk110/vllm-spark:turboquant}
    container_name: scribe-asr
    entrypoint: []
    command:
      - /bin/bash
      - -c
      - >
        vllm serve Qwen/Qwen3-ASR-1.7B
        --host 0.0.0.0
        --port 8003
        --tensor-parallel-size 1
        --max-model-len 4096
        --gpu-memory-utilization 0.10
        --max-num-seqs 4
        --enforce-eager
        --load-format fastsafetensors
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 16g
    ulimits:
      memlock: -1
    volumes:
      - ${HF_CACHE_DIR:-/data/huggingface}:/root/.cache/huggingface
    environment:
      - NVIDIA_DISABLE_REQUIRE=1
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # Auto-heal: restarts any container Docker marks unhealthy.
  # Combined with CUDA health checks in diarize/TTS, a GPU-broken
  # container gets restarted within ~45s automatically.
  autoheal:
    image: willfarrell/autoheal
    container_name: scribe-autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=15
      - AUTOHEAL_START_PERIOD=300
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
